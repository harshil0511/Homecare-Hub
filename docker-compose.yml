services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homecare-backend
    ports:
      - "8002:8002"
    environment:
      # ✅ Fixed: correct driver prefix (psycopg3) + correct hostname/port/creds inside Docker network
      - DATABASE_URL=postgresql+psycopg://homecare_user:homecare_pass@postgres:5432/homecare
      - SECRET_KEY=4cac0510d841635cd37ef9448b89d6bc86266811f39258c0a7a0ba687b027f8a
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - SUPERADMIN_EMAIL=chaudharyhp628@gmail.com
      - SUPERADMIN_PASSWORD=SuperAdmin@628
      - SUPERADMIN_USERNAME=Super Admin
      - FRONTEND_URL=http://localhost:3000
      - ANTHROPIC_API_KEY=
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        # ✅ Fixed: wait for Postgres to be actually healthy, not just started
        condition: service_healthy
    networks:
      - homecare-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homecare-frontend
    ports:
      - "3000:3000"
    environment:
      # ✅ localhost:8000 is correct here — NEXT_PUBLIC_ vars are used by the browser
      - NEXT_PUBLIC_API_URL=http://localhost:8002
      # For server-side (SSR) API calls inside Docker, use the internal hostname
      - INTERNAL_API_URL=http://backend:8002
    depends_on:
      - backend
    networks:
      - homecare-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: homecare-postgres
    environment:
      - POSTGRES_USER=homecare_user
      - POSTGRES_PASSWORD=homecare_pass
      - POSTGRES_DB=homecare
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homecare-network
    restart: unless-stopped
    # ✅ Fixed: healthcheck so backend waits until Postgres is truly ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homecare_user -d homecare"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  homecare-network:
    driver: bridge

volumes:
  postgres_data:
